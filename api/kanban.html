<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かんばん印刷</title>
    <style>
        @media print {
            @page {
                size: A4;
                margin: 10mm;
            }

            .no-print {
                display: none;
            }

            .page-break {
                page-break-after: always;
            }
        }

        body {
            font-family: 'MS Gothic', monospace;
            margin: 0;
            padding: 20px;
        }

        .kanban {
            width: 100%;
            margin-bottom: 20px;
        }

        .kanban-title {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            padding: 10px;
            background: #333;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #e0e0e0;
            font-weight: bold;
        }

        .btn-group {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="no-print btn-group">
        <button onclick="window.print()">🖨️ 印刷</button>
        <button onclick="window.close()">閉じる</button>
    </div>

    <div id="kanban-container">
        <!-- JavaScriptで動的生成 -->
    </div>

    <script>
        // セッションからデータ取得して表示
        async function loadKanbans() {
            try {
                const response = await fetch('kanban.php');
                const result = await response.json();

                if (result.success) {
                    displayKanbans(result.files);
                } else {
                    alert('エラー: ' + result.message);
                }
            } catch (error) {
                alert('通信エラー: ' + error.message);
            }
        }

        function displayKanbans(files) {
            const container = document.getElementById('kanban-container');
            container.innerHTML = '';

            // 実際にはExcelファイルの内容を読み込む必要がある
            // ここでは簡易表示
            files.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'kanban';
                if (index < files.length - 1) {
                    div.className += ' page-break';
                }
                div.innerHTML = `
                    <div class="kanban-title">${file.name}</div>
                    <p>ファイルパス: ${file.path}</p>
                `;
                container.appendChild(div);
            });
        }

        loadKanbans();
    </script>
</body>

</html>
