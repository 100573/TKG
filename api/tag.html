<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タグ印刷</title>
    <style>
        @media print {
            @page {
                size: 80mm auto;
                margin: 0;
            }

            .no-print {
                display: none;
            }
        }

        body {
            font-family: 'MS Gothic', monospace;
            margin: 0;
            padding: 0;
            width: 80mm;
        }

        .tag {
            width: 80mm;
            padding: 5mm;
            box-sizing: border-box;
        }

        .tag-title {
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 3mm;
            margin-bottom: 3mm;
        }

        .tag-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2mm;
            font-size: 11px;
        }

        .tag-row span:first-child {
            font-weight: bold;
        }

        .tag-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            margin-top: 3mm;
        }

        .tag-table th,
        .tag-table td {
            border: 1px solid #000;
            padding: 2mm;
            text-align: left;
        }

        .tag-table th {
            background: #e0e0e0;
            font-weight: bold;
        }

        .tag-break {
            page-break-after: always;
        }

        .btn-group {
            padding: 10px;
            background: #f0f0f0;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="no-print btn-group">
        <button onclick="window.print()">🖨️ 印刷</button>
        <button onclick="window.close()">閉じる</button>
    </div>

    <div id="tag-container">
        <!-- JavaScriptで動的生成 -->
    </div>

    <script>
        async function loadTags() {
            try {
                const response = await fetch('tag.php');
                const result = await response.json();

                if (result.success) {
                    document.getElementById('tag-container').innerHTML = result.html;
                } else {
                    alert('エラー: ' + result.message);
                }
            } catch (error) {
                alert('通信エラー: ' + error.message);
            }
        }

        loadTags();
    </script>
</body>

</html>
